# kind cluster for the Software Factory (spec §2, local profile).
# CRITICAL: the default CNI (kindnet) silently DOES NOT enforce NetworkPolicy —
# it is disabled here and Calico installed by `task kind-up`; enforcement is
# then PROVEN by scripts/calico-probe.sh, never assumed.
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: software-factory
networking:
  disableDefaultCNI: true
  podSubnet: "192.168.0.0/16"   # calico.yaml's default IPv4 pool — keep equal
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80       # ingress-nginx hostPort
        hostPort: 8081          # http://<host>.localtest.me:8081
        protocol: TCP
# Plan B3: the produced-app image name is sf-registry:5000/... for BOTH kaniko
# (push, via cluster DNS) and the kubelet (pull). The node cannot do cluster DNS,
# so redirect that host to the registry's NodePort on localhost.
containerdConfigPatches:
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."sf-registry:5000"]
      endpoint = ["http://localhost:30500"]
    [plugins."io.containerd.grpc.v1.cri".registry.configs."sf-registry:5000".tls]
      insecure_skip_verify = true
