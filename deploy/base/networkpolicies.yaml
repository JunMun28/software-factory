# The walls (spec §2), enforced by Calico and PROVEN by scripts/netpol-smoke.sh.
# Vanilla NetworkPolicy cannot express "github.com only" (FQDN rules are a
# Calico Enterprise/Cilium feature) — the local profile uses CIDR-shaped
# walls instead: stage pods may reach the internet (the LLM) but nothing
# in-cluster except git; gate pods reach ONLY git (no LLM, spec §6).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - {protocol: UDP, port: 53}
        - {protocol: TCP, port: 53}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-walls
spec:
  podSelector:
    matchLabels:
      app: api
  policyTypes: [Ingress, Egress]
  ingress:
    - from:                             # the console door: ingress controller + SPAs
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: intake
        - podSelector:
            matchLabels:
              app: console
      ports:
        - {protocol: TCP, port: 8000}
    - from:                             # the git door: agent tier ONLY, 9418 ONLY
        - podSelector:
            matchLabels:
              sf/tier: agent
      ports:
        - {protocol: TCP, port: 9418}
  egress:
    - {}                                # trusted control plane: kube API, Azure SQL, GitHub (B3)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: spa-walls
spec:
  podSelector:
    matchExpressions:
      - {key: app, operator: In, values: [intake, console]}
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - {protocol: TCP, port: 80}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: api
      ports:
        - {protocol: TCP, port: 8000}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: agent-stage-walls
spec:
  podSelector:
    matchLabels:
      sf/role: stage
  policyTypes: [Ingress, Egress]        # no ingress rules = nothing may dial in
  egress:
    - to:                               # git (clone + push)
        - podSelector:
            matchLabels:
              app: api
      ports:
        - {protocol: TCP, port: 9418}
    - to:                               # the LLM endpoint — internet yes, cluster no
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 192.168.0.0/16          # pod CIDR (deploy/kind/cluster.yaml)
              - 10.96.0.0/12            # service CIDR
              - 169.254.0.0/16          # link-local: cloud metadata/IMDS (SSRF wall for Azure)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gate-walls
spec:
  podSelector:
    matchLabels:
      sf/role: gate
  policyTypes: [Ingress, Egress]
  egress:
    - to:                               # gates reach git and NOTHING else — no LLM (spec §6)
        - podSelector:
            matchLabels:
              app: api
      ports:
        - {protocol: TCP, port: 9418}
---
# build pods (Plan B3): git (clone init) + registry (kaniko push) + DNS via the
# shared allow-dns. NO LLM, no peers, nothing dials in.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: build-walls
spec:
  podSelector:
    matchLabels:
      sf/role: build
  policyTypes: [Ingress, Egress]        # no ingress rules = nothing may dial in
  egress:
    - to:                               # git-daemon clone
        - podSelector:
            matchLabels:
              app: api
      ports:
        - {protocol: TCP, port: 9418}
    - to:                               # kaniko push
        - podSelector:
            matchLabels:
              app: registry
      ports:
        - {protocol: TCP, port: 5000}
    - to:                               # base-image pulls via the proxy cache
        - podSelector:
            matchLabels:
              app: registry-proxy
      ports:
        - {protocol: TCP, port: 5000}
    - to:                               # package registries (pip/npm) — FQDN
        - ipBlock:                      # allowlists need Calico EE/EgressFirewall;
            cidr: 0.0.0.0/0             # the local wall is internet-except-cluster,
            except:                     # same trade-off as stage pods' LLM egress
              - 192.168.0.0/16          # pod CIDR
              - 10.96.0.0/12            # service CIDR
              - 169.254.0.0/16          # link-local/IMDS
---
# produced-app pods (Plan B3, spec §2): ingress from ingress-nginx ONLY;
# egress nothing (DNS rides the shared allow-dns). No factory, no peers.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: app-walls
spec:
  podSelector:
    matchLabels:
      sf/tier: app
  policyTypes: [Ingress, Egress]
  ingress:
    - from:                             # users come through the ingress; the
        - namespaceSelector:            # factory-api's deploy-verify health
            matchLabels:                # probe is the one in-cluster caller
              kubernetes.io/metadata.name: ingress-nginx
        - podSelector:
            matchLabels:
              app: api
      ports:
        - {protocol: TCP, port: 8000}
  egress: []
---
# the registry accepts pushes from build pods; node NodePort pulls arrive
# off-mesh (kubelet), so one port-only rule keeps them working.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: registry-walls
spec:
  podSelector:
    matchLabels:
      app: registry
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              sf/role: build
      ports:
        - {protocol: TCP, port: 5000}
    - ports:
        - {protocol: TCP, port: 5000}
---
# the proxy cache is the controlled egress door for base images: build pods in,
# upstream registry out. Nothing else in-cluster is reachable from it.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: registry-proxy-walls
spec:
  podSelector:
    matchLabels:
      app: registry-proxy
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              sf/role: build
      ports:
        - {protocol: TCP, port: 5000}
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - 192.168.0.0/16          # pod CIDR
              - 10.96.0.0/12            # service CIDR
              - 169.254.0.0/16          # link-local/IMDS
---
# ng-v0 orchestrator (Phase 0, docs/design/cloud-sandbox-pods.md) — modelled on
# api-walls. Under default-deny it would be unreachable; these open only the two
# doors it needs. The http door: the UI pod (its nginx proxy_pass targets
# ng-v0-orchestrator:7071 and tunnels the preview/HMR upgrade). The git door:
# the ngv0 tier only, on 9418 — the Phase 1 sandbox pods that clone workspaces.
# Egress is the trusted-control-plane `- {}` (same as api-walls): the
# orchestrator runs turns (LLM endpoints on the internet) and drives the k8s API
# in Phase 1; DNS already rides the shared allow-dns.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ng-v0-orchestrator-walls
spec:
  podSelector:
    matchLabels:
      app: ng-v0-orchestrator
  policyTypes: [Ingress, Egress]
  ingress:
    - from:                             # the http door: the UI pod (nginx proxy)
        - podSelector:                  # AND ingress-nginx (host-routed previews
            matchLabels:                # <slug>.preview.ngv0... arrive from the
              app: ng-v0-ui             # ingress controller, proxied to a sandbox)
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - {protocol: TCP, port: 7071}
    - from:                             # the git door: ngv0 + sandbox tiers, 9418 ONLY
        - podSelector:
            matchLabels:
              sf/tier: ngv0
        - podSelector:                  # Phase 1 sandbox pods clone their workspace
            matchLabels:
              sf/tier: sandbox
      ports:
        - {protocol: TCP, port: 9418}
  egress:
    - {}                                # turns (LLM), k8s API (Phase 1), Azure SQL
---
# ng-v0 UI (Phase 0) — modelled on spa-walls: users arrive through
# ingress-nginx on :80, and the nginx proxy dials the orchestrator on :7071.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ng-v0-ui-walls
spec:
  podSelector:
    matchLabels:
      app: ng-v0-ui
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - {protocol: TCP, port: 80}
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: ng-v0-orchestrator
      ports:
        - {protocol: TCP, port: 7071}
---
# ng-v0 sandbox pods (Phase 1/2): one per chat, a live dev server that tracks the
# chat's git ref. Only the orchestrator bridge may dial in — the preview proxy on
# 8080 and the resync poke on 8090. Egress: DNS (shared allow-dns) + the
# orchestrator git-daemon (9418, clone/fetch the workspace) + package registries
# for npm install / uv sync (internet-except-cluster, same trade-off as build-walls).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: sandbox-walls
spec:
  podSelector:
    matchLabels:
      sf/tier: sandbox
  policyTypes: [Ingress, Egress]
  ingress:
    - from:                             # the orchestrator bridge proxy + resync poke
        - podSelector:
            matchLabels:
              app: ng-v0-orchestrator
      ports:
        - {protocol: TCP, port: 8080}
        - {protocol: TCP, port: 8090}
  egress:
    - to:                               # clone/fetch the workspace from the git-daemon
        - podSelector:
            matchLabels:
              app: ng-v0-orchestrator
      ports:
        - {protocol: TCP, port: 9418}
    - to:                               # package registries (npm/uv) — internet-except-
        - ipBlock:                      # cluster; FQDN allowlists need Calico EE
            cidr: 0.0.0.0/0
            except:
              - 192.168.0.0/16          # pod CIDR
              - 10.96.0.0/12            # service CIDR
              - 169.254.0.0/16          # link-local/IMDS
