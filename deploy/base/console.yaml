apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
  labels:
    app: console
    sf/tier: factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: console
  template:
    metadata:
      labels:
        app: console
        sf/tier: factory
    spec:
      containers:
        - name: web
          image: sf-console:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 250m, memory: 128Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: console
spec:
  selector:
    app: console
  ports:
    - port: 80
      targetPort: 80
