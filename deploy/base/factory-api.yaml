apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sf-data
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
# ONE replica, ONE uvicorn worker (CLAUDE.md hard rule): the tick loop and the
# kube runner assume a single process. strategy Recreate: the RWO volume can
# never deadlock a rolling update.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: factory-api
  labels:
    app: api
    sf/tier: factory
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        sf/tier: factory
    spec:
      serviceAccountName: sf-api
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: sf-data
      initContainers:
        - name: init-dirs
          image: sf-api:dev
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "mkdir -p /data/workspaces /data/uploads"]
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: api
          image: sf-api:dev
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: factory-config
          env:
            # GitHub mode (Plan B4b): the PAT rides a Secret, never the ConfigMap.
            # optional: a token-less cluster runs in git-daemon mode unchanged.
            - name: FACTORY_GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: sf-github-token
                  key: token
                  optional: true
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: {cpu: 250m, memory: 512Mi}
            limits: {cpu: "1", memory: 1Gi}
          volumeMounts:
            - name: data
              mountPath: /data
        # The git backbone (Plan B2): exports /data/workspaces to agent/gate
        # Jobs as git://api:9418/<ref>. receive-pack is enabled — locally the
        # walls are NetworkPolicies (only sf/tier=agent pods reach 9418);
        # authenticated remotes (GitHub) replace this seam in B3.
        - name: git-daemon
          image: sf-api:dev
          imagePullPolicy: IfNotPresent
          command:
            - git
            - daemon
            - --reuseaddr
            - --verbose
            - --export-all
            - --enable=receive-pack
            - --base-path=/data/workspaces
            - /data/workspaces
          ports:
            - containerPort: 9418
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 250m, memory: 256Mi}
          volumeMounts:
            - name: data
              mountPath: /data
---
# Named `api` ON PURPOSE: the SPA images bake `proxy_pass http://api:8000`
# (compose parity) — the Service name keeps those images unchanged.
apiVersion: v1
kind: Service
metadata:
  name: api
  labels:
    app: api
spec:
  selector:
    app: api
  ports:
    - name: http
      port: 8000
      targetPort: 8000
    - name: git
      port: 9418
      targetPort: 9418
