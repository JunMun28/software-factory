# The factory's env (spec §3.5). Azure SQL: once provisioned, override
# FACTORY_DB_URL via a Secret-backed patch in the overlay — one env swap.
apiVersion: v1
kind: ConfigMap
metadata:
  name: factory-config
data:
  FACTORY_RUNNER: "kube"
  FACTORY_CLI: "codex"                # local profile: codex on the subscription (spec §2)
  FACTORY_KUBE_NAMESPACE: "software-factory"
  FACTORY_AGENT_IMAGE: "sf-agent:dev"
  FACTORY_GIT_REMOTE_BASE: "git://api.software-factory.svc.cluster.local:9418"
  FACTORY_DB_URL: "sqlite:////data/factory.db"
  FACTORY_WORKSPACES: "/data/workspaces"
  FACTORY_UPLOADS: "/data/uploads"
  FACTORY_SEED_DEMO: "1"              # the smoke drives the seeded northwind app
  FACTORY_INTERVIEW_PREGEN: "sync"
  FACTORY_LOG_LEVEL: "INFO"
  FACTORY_REGISTRY: "sf-registry:5000"
  FACTORY_APP_DEPLOY: "1"
  FACTORY_BUILD_CAP: "4"
  FACTORY_REGISTRY_RETENTION: "7d"
  # TODO(SEC-06): replace this fixed tag with @sha256 after the office mirror
  # exposes a digest verified for both amd64 and arm64.
  FACTORY_KANIKO_IMAGE: "gcr.io/kaniko-project/executor:v1.23.2"
  FACTORY_APP_INGRESS_DOMAIN: "localtest.me"
  FACTORY_REGISTRY_PROXY: "sf-registry-proxy:5000"
  # TODO: set to the owning GitHub org before enabling GitHub mode. Left as a
  # placeholder deliberately: GitHub mode activates only when the
  # sf-github-token Secret also exists, so a placeholder here stays inert.
  FACTORY_GITHUB_OWNER: "your-github-org"
