# Per-tier ServiceAccounts (spec §2): the factory-api SA is the ONLY one with
# RBAC; agent/gate SAs exist so pods bind to something with zero rights and
# never mount a token (the Job manifests also set automount false).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sf-api
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sf-agent
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sf-gate
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sf-build
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sf-app
automountServiceAccountToken: false
---
# ng-v0 orchestrator (docs/design/cloud-sandbox-pods.md). UNLIKE the agent/gate
# SAs, this one DOES mount its token: Phase 1 drives the k8s API from inside the
# orchestrator pod to create per-chat sandbox pods. Phase 0 grants it no RBAC
# (that lands in Phase 2) — the token authenticates but authorizes nothing yet.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: sf-ngv0
automountServiceAccountToken: true
