# factory-api owns the FULL Job lifecycle (spec §5): create/watch/delete Jobs,
# read pods and pod logs (envelope + NDJSON capture). Nothing else.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sf-api-jobs
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sf-api-jobs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sf-api-jobs
subjects:
  - kind: ServiceAccount
    name: sf-api
    namespace: software-factory   # required for SA subjects — kustomize does not inject it
---
# Plan B3: factory-owned deploy of produced apps. k8s RBAC cannot restrict
# `create` by label — scoping is namespace + resource type; teardown uses
# deletecollection WITH a labelSelector (sf/instance=<slug>), which is
# label-scoped. The factory only applies sf-app-<slug> names from
# deploy_manifests (allowlist by construction).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sf-api-deploy
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "get", "list", "watch", "patch", "delete", "deletecollection"]
  - apiGroups: ["apps"]
    resources: ["deployments/status"]   # rollout_ready reads the status subresource
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["create", "get", "list", "patch", "delete", "deletecollection"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sf-api-deploy
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sf-api-deploy
subjects:
  - kind: ServiceAccount
    name: sf-api
    namespace: software-factory
---
# ng-v0 orchestrator (Phase 2, docs/design/cloud-sandbox-pods.md): the sf-ngv0 SA
# creates and reaps one sandbox Deployment+Service per chat. Same shape as
# sf-api-deploy (namespace+type scoped; create can't be label-scoped, teardown
# uses deletecollection with an sf/session selector). No ingresses (sandboxes are
# reached through the orchestrator's in-process bridge, not a per-sandbox ingress).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sf-ngv0-sandbox
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["create", "get", "list", "watch", "patch", "delete", "deletecollection"]
  - apiGroups: ["apps"]
    resources: ["deployments/status"]   # KubeSandbox.rolloutReady reads status
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["create", "get", "list", "patch", "delete", "deletecollection"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sf-ngv0-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sf-ngv0-sandbox
subjects:
  - kind: ServiceAccount
    name: sf-ngv0
    namespace: software-factory
