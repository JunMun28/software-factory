# factory-api owns the FULL Job lifecycle (spec §5): create/watch/delete Jobs,
# read pods and pod logs (envelope + NDJSON capture). Nothing else.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sf-api-jobs
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sf-api-jobs
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sf-api-jobs
subjects:
  - kind: ServiceAccount
    name: sf-api
    namespace: software-factory   # required for SA subjects — kustomize does not inject it
