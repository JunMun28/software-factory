# In-cluster image registry (Plan B3): kaniko pushes here via cluster DNS
# (sf-registry:5000); the node pulls the SAME name via a containerd mirror to
# NodePort 30500 (deploy/kind/cluster.yaml). One image name both sides.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sf-registry
  labels:
    app: registry
    sf/tier: factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: registry
  template:
    metadata:
      labels:
        app: registry
        sf/tier: factory
    spec:
      containers:
        - name: registry
          image: registry:2
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          resources:
            requests: {cpu: 50m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}
---
apiVersion: v1
kind: Service
metadata:
  name: sf-registry
  labels:
    app: registry
spec:
  type: NodePort
  selector:
    app: registry
  ports:
    - name: registry
      port: 5000
      targetPort: 5000
      nodePort: 30500
