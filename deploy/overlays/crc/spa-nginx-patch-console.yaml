apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
spec:
  template:
    spec:
      containers:
        - name: web
          imagePullPolicy: Always
          volumeMounts:
            - {name: nginx-conf, mountPath: /etc/nginx/conf.d/default.conf, subPath: nginx-8080.conf}
      volumes:
        - name: nginx-conf
          configMap: {name: spa-nginx-8080}
