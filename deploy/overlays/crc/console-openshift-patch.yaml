# stock nginx needs writable cache/run dirs; OpenShift runs an arbitrary
# non-root UID (E2E-7 live finding)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: console
spec:
  template:
    spec:
      containers:
        - name: web
          volumeMounts:
            - {name: nginx-cache, mountPath: /var/cache/nginx}
            - {name: nginx-run, mountPath: /var/run}
      volumes:
        - {name: nginx-cache, emptyDir: {}}
        - {name: nginx-run, emptyDir: {}}
