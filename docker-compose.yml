# Production-shaped local deployment: nginx serves the SPA and proxies /api
# to the FastAPI service; SQLite persists in a named volume.
#   docker compose up --build   →   http://localhost:8080
#
# The api service must stay at ONE replica with ONE uvicorn worker: the tick
# loop and the pipeline worker threads assume a single process, and SQLite has
# a single writer. Never `--scale api=2` (ADR 0013 — the app refuses the tick
# loop if WEB_CONCURRENCY > 1, but scaled replicas it cannot see).
services:
  api:
    build:
      context: .                  # repo root: the image needs sample/ for workspaces
      dockerfile: api/Dockerfile
    environment:
      SIM_INTERVAL: "8"           # keep the factory alive; set 0 to freeze
      FACTORY_DB_URL: sqlite:////data/factory.db
      FACTORY_SEED_DEMO: "0"      # production DBs start EMPTY; set 1 for the demo world
      FACTORY_WORKSPACES: /data/workspaces   # the factory's output survives rebuilds
    volumes:
      - factory-data:/data
  web:
    build: ./web
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  factory-data:
