server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # SSE: the intake interview + prototype streams drive slow model generation over one open
    # connection. Regex location wins over the /api/ prefix below, so the stream gets no
    # buffering, HTTP/1.1 keep-alive, and a generous read timeout (a slow generation must not be
    # cut mid-stream — the prototype's full-document build routinely exceeds nginx's 60s default).
    # The backend also sets X-Accel-Buffering: no as belt-and-suspenders.
    location ~ ^/api/requests/\d+/(interview|prototype)/stream$ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # same-origin API: the SPA calls /api, nginx hands it to the backend service
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — Angular owns the routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json font/woff2;
}
