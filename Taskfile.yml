# Software Factory — local dev & verification (cross-platform).
#
# Task (https://taskfile.dev) replaces the Unix-shell Makefile so dev/verify run
# natively on Windows: Task embeds its own shell (mvdan/sh), so these recipes need
# no WSL/Git Bash (ADR 0017 Phase 3 — the primary dev box is Windows).
#
# Stack: FastAPI + uv (api/) · Angular 22 monorepo (apps/intake + apps/console,
# packages/shared) · SQLite (throwaway, gitignored). Single root node_modules; the
# Angular workspace (angular.json) lives at the repo root (ADR 0017 Phase 2).
#
# NODE: these recipes assume the correct Node is already on PATH. .nvmrc pins the
# version (24.15.0) — Angular's CLI rejects anything older. Activate it per-shell
# before running task:
#   macOS/Linux (nvm):   nvm use            # reads .nvmrc
#   Windows (fnm):       fnm use            # reads .nvmrc
#   Windows (nvm-win):   nvm use 24.15.0
#   any OS (volta):      volta pin node@24.15.0   # then it's automatic
# We do NOT source nvm inside the Taskfile — nvm is a bash function, not portable.

version: "3"

vars:
  INTAKE_PORT: '{{.INTAKE_PORT | default "4201"}}'   # task dev INTAKE_PORT=4301 if :4201 is taken
  CONSOLE_PORT: '{{.CONSOLE_PORT | default "4202"}}'  # second app gets its own origin (ADR 0017)

tasks:
  # Bare `task` lists every recipe.
  default:
    cmds:
      - task --list
    silent: true

  # Run backend + BOTH frontends together (Ctrl-C stops all). Distinct origins:
  # intake :4201, console :4202, api :8000. Simulator ticks every 8s. The three
  # deps run concurrently (Task's native parallelism).
  dev:
    desc: API :8000 + intake :{{.INTAKE_PORT}} + console :{{.CONSOLE_PORT}} together (Ctrl-C stops all)
    deps: [api, intake, console]

  # Backend only (auto-seeds on first boot; SIM_INTERVAL=8 keeps builds moving).
  api:
    desc: Backend only on :8000 (auto-seeds; simulator ticks every 8s)
    dir: api
    env:
      SIM_INTERVAL: "8"
    cmds:
      - uv run uvicorn app.main:app --port 8000 --reload

  # Serve the Intake app (the default `web` target — back-compat alias for intake).
  web:
    desc: Alias for `intake` (back-compat)
    deps: [intake]

  # Serve the Intake app (submitter + admin for now).
  intake:
    desc: Serve the Intake app on :{{.INTAKE_PORT}}
    cmds:
      - npx ng serve intake --port {{.INTAKE_PORT}}

  # Serve the Console shell.
  console:
    desc: Serve the Console shell on :{{.CONSOLE_PORT}}
    cmds:
      - npx ng serve console --port {{.CONSOLE_PORT}}

  # Backend behavioral + hardening tests (lifecycle, gates, ledger idempotency,
  # event log, simulator, validation).
  test:
    desc: Backend tests (pytest)
    dir: api
    cmds:
      - uv run pytest -q

  # Frontend unit tests (vitest). Runs ALL THREE projects in the repo-root
  # workspace (ADR 0017): the intake app (former web-app specs), the console
  # shell, AND the @sf/shared library, which owns the moved util/poll/theme
  # specs. A bare `ng test` is avoided because it would try every project at
  # once; each is run explicitly so every spec set stays in the verify chain.
  test-web:
    desc: Frontend unit tests for all three projects (intake + console + shared)
    cmds:
      - npx ng test intake
      - npx ng test console
      - npx ng test shared

  # Frontend production build of BOTH apps (catches template/type errors).
  build:
    desc: Production build of both apps (intake + console)
    cmds:
      - npx ng build intake
      - npx ng build console

  # End-to-end lifecycle smoke against a real server on a throwaway DB.
  smoke:
    desc: End-to-end lifecycle smoke against a live server (throwaway DB)
    cmds:
      - ./scripts/smoke.sh

  # Lint both sides (ruff + eslint + prettier check). The Angular workspace now
  # lives at the repo root (ADR 0017 Phase 2), so each project is linted
  # explicitly — intake + console apps and the @sf/shared library (its
  # sf-prefixed selector rules live in packages/shared/eslint.config.js).
  lint:
    desc: Lint both sides (ruff + ng lint x3 + prettier check)
    cmds:
      - cd api && uv run ruff check .
      - npx ng lint intake
      - npx ng lint console
      - npx ng lint shared
      - npm run format:check

  # Everything: lint + backend tests + web tests + build + smoke. Green = safe.
  # PARITY with the old `make verify`.
  verify:
    desc: "Everything: lint + pytest + vitest(x3) + build(x2) + smoke. Green = safe"
    cmds:
      - task: lint
      - task: test
      - task: test-web
      - task: build
      - task: smoke
      - echo ""
      - echo "✓ VERIFY PASSED — tests, build, and smoke all green"

  # The Model 1 gate (ADR 0017): the Intake app's FULL verify, scoped to intake
  # only. CI runs this as an extra required check on any PR that touches
  # packages/shared (@sf/shared) — a shared change ripples into intake at build
  # time, so we prove intake still lints, tests, builds, and drives the full
  # lifecycle (smoke) before such a PR can merge. Kept thin so the gate is cheap.
  verify-intake:
    desc: "Intake app full verify (lint+test+build intake + smoke) — the @sf/shared gate"
    cmds:
      - cd api && uv run ruff check .
      - npx ng lint shared
      - npx ng lint intake
      - npx ng test shared
      - npx ng test intake
      - npx ng build intake
      - task: smoke
      - echo ""
      - echo "✓ INTAKE VERIFY PASSED — @sf/shared change is safe for the Intake app"

  # Production-shaped deployment: nginx + API + persistent volume on :8080.
  up:
    desc: Production-shaped stack (docker compose) on :8080
    cmds:
      - docker compose up --build

  # Online backup of the SQLite system of record (safe on a LIVE database — uses
  # sqlite's backup API, never a raw cp). For the compose stack:
  #   docker compose exec api uv run --no-sync python -c "<same one-liner> '/data/factory.db'"
  backup:
    desc: Online backup of the SQLite system of record (safe on a live DB)
    cmds:
      - python3 -c "import os,sqlite3,datetime,pathlib; os.makedirs('backups',exist_ok=True); src=sqlite3.connect('api/factory.db'); out=f'backups/factory-{datetime.datetime.now():%Y%m%d-%H%M%S}.db'; dst=sqlite3.connect(out); src.backup(dst); dst.close(); print(f'✓ {out} ({pathlib.Path(out).stat().st_size:,} bytes)')"

  # Wipe the local database (re-seeds on next boot).
  reset:
    desc: Wipe the local DB (re-seeds on next `task api`)
    cmds:
      - rm -f api/factory.db api/factory.db-wal api/factory.db-shm
      - echo "factory.db removed — fresh seed on next 'task api'"

  # ---------- Kubernetes local profile (Plan B2, spec §2/§9 Phase 1) ----------
  # kind + Calico (kindnet does NOT enforce NetworkPolicy) + ingress-nginx.
  kind-up:
    desc: Create the software-factory kind cluster (Calico CNI + ingress-nginx) and PROVE policy enforcement
    cmds:
      - kind get clusters | grep -qx software-factory || kind create cluster --config deploy/kind/cluster.yaml
      # server-side apply: calico.yaml's CRDs overflow the client-side last-applied annotation
      - kubectl apply --server-side --force-conflicts -f https://raw.githubusercontent.com/projectcalico/calico/v3.30.3/manifests/calico.yaml
      - kubectl -n kube-system rollout status daemonset/calico-node --timeout=300s
      - kubectl wait --for=condition=Ready nodes --all --timeout=300s
      - kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.13.0/deploy/static/provider/kind/deploy.yaml
      - kubectl -n ingress-nginx rollout status deployment/ingress-nginx-controller --timeout=300s
      - ./scripts/calico-probe.sh

  kind-load:
    desc: Build all four images and load them into the kind cluster
    cmds:
      - docker build -t sf-api:dev -f api/Dockerfile .
      - docker build -t sf-intake:dev -f apps/intake/Dockerfile .
      - docker build -t sf-console:dev -f apps/console/Dockerfile .
      - docker build -t sf-agent:dev -f docker/sf-agent/Dockerfile .
      - kind load docker-image sf-api:dev sf-intake:dev sf-console:dev sf-agent:dev --name software-factory

  kind-down:
    desc: Delete the software-factory kind cluster
    cmds:
      - kind delete cluster --name software-factory

  kind-deploy:
    desc: Apply deploy/overlays/local and wait for every rollout
    cmds:
      - kubectl apply -k deploy/overlays/local
      - kubectl -n software-factory rollout status deployment/factory-api --timeout=300s
      - kubectl -n software-factory rollout status deployment/intake --timeout=180s
      - kubectl -n software-factory rollout status deployment/console --timeout=180s

  sync-codex-auth:
    desc: Sync ~/.codex/auth.json into the sf-codex-auth Secret (single-developer, spec §2)
    cmds:
      - kubectl -n software-factory create secret generic sf-codex-auth --from-file=auth.json=$HOME/.codex/auth.json --dry-run=client -o yaml | kubectl apply -f -

  kind-smoke:
    desc: "One request end-to-end on kind (needs codex auth secret; ~10-25 min, spends codex usage)"
    cmds:
      - ./scripts/kind-smoke.sh
