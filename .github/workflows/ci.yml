name: CI

# Full verify for the repo-root Angular workspace + FastAPI backend (ADR 0017).
# This single job is parity with local `task verify`: lint + pytest +
# vitest (intake + console + shared) + production build (BOTH apps) + smoke.
# Node comes from .nvmrc (24.15.0), Python deps via uv, orchestration via Task.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Python side: uv installs/runs the FastAPI backend (api/) for pytest + smoke.
      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          # No cache: the action's post-job "prune cache" hangs ~5 min then exits 2
          # on this repo (the uv project lives in api/, no root lockfile to key on).
          # uv installs are fast — skip caching so the post step can't fail the job.
          enable-cache: false

      # Node side: pin to the workspace's .nvmrc (24.15.0) — Angular's CLI rejects
      # older. Cache keyed on the repo-root lockfile (single root node_modules).
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      # Task (taskfile.dev) is the cross-platform orchestrator that replaced the
      # Makefile (ADR 0017 Phase 3); the job calls the same recipes as local dev.
      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Root install against the single root package-lock.json (replaces the old
      # web/-scoped npm ci). Angular workspace + all three projects share this.
      - name: Install web dependencies
        run: npm ci

      # One recipe = full parity with local verify: lint (ruff + ng lint x3 +
      # prettier) + pytest + vitest (intake + console + shared) + build (intake +
      # console) + smoke. Ensures BOTH apps build and EACH unit suite runs.
      - name: task verify
        run: task verify

  verify-appview:
    runs-on: ubuntu-latest
    # The ng-v0 half (app-preview/) is two npm projects with their own
    # lockfiles, outside the repo-root Angular workspace — the `verify` job's
    # root `npm ci` does not install them. Its own job so it runs in parallel
    # and a failure names the right half of the repo. See plans/012.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Set up Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install app-preview dependencies
        run: task appview-install

      - name: Typecheck + test
        run: |
          task appview-typecheck
          task appview-test

  test-mssql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      # The SA password is generated per run: nothing is hardcoded, so there is
      # no password literal in this public repo (plans/019). ::add-mask:: keeps
      # it out of the log even if a later command echoes a connection string.
      - name: Start SQL Server
        run: |
          PW="$(openssl rand -base64 24 | tr -d '/+=' | head -c 24)Aa1!"
          echo "::add-mask::$PW"
          echo "MSSQL_SA_PASSWORD=$PW" >> "$GITHUB_ENV"
          docker run -d --name mssql \
            -e ACCEPT_EULA=Y -e "MSSQL_SA_PASSWORD=$PW" \
            -p 1433:1433 mcr.microsoft.com/mssql/server:2022-latest
      - name: Install ODBC driver 18
        run: |
          curl -sSL -O https://packages.microsoft.com/config/ubuntu/22.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update && sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18
      - name: Install python deps
        working-directory: api
        run: uv sync
      - name: Wait for SQL Server
        working-directory: api
        run: |
          for i in $(seq 1 30); do
            if uv run python -c "
          import os, pyodbc
          pyodbc.connect(
              'DRIVER={ODBC Driver 18 for SQL Server};SERVER=localhost,1433;UID=sa;'
              'PWD=' + os.environ['MSSQL_SA_PASSWORD'] + ';TrustServerCertificate=yes',
              timeout=5,
          )" 2>/dev/null; then echo "ready after ${i} attempt(s)"; exit 0; fi
            sleep 5
          done
          echo "SQL Server did not become ready"; docker logs mssql | tail -50; exit 1
      # Create the database over the same driver stack the tests use (pyodbc +
      # ODBC Driver 18) — no docker exec into the service container, whose id
      # lookup is brittle ($(docker ps -q --filter ...) empty-substitutes).
      - name: Create database
        working-directory: api
        run: |
          uv run python -c "import os, pyodbc; cn=pyodbc.connect('DRIVER={ODBC Driver 18 for SQL Server};SERVER=localhost,1433;UID=sa;PWD=' + os.environ['MSSQL_SA_PASSWORD'] + ';TrustServerCertificate=yes', autocommit=True); cn.execute(\"IF DB_ID('factory') IS NULL CREATE DATABASE factory\")"
      - name: Run suite against MSSQL
        working-directory: api
        run: |
          ENC_PW=$(uv run python -c "import urllib.parse, os; print(urllib.parse.quote(os.environ['MSSQL_SA_PASSWORD'], safe=''))")
          FACTORY_DB_URL="mssql+pyodbc://sa:${ENC_PW}@localhost:1433/factory?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes"
          echo "FACTORY_DB_URL=$FACTORY_DB_URL" >> "$GITHUB_ENV"
          export FACTORY_DB_URL
          # upgrade must run BEFORE pytest: conftest's _truncate_all() executes
          # before the app lifespan migrates, so the tables must already exist
          uv run alembic upgrade head
          uv run pytest -q
