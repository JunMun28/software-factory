<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Basics · v06 — Chat quick-replies</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<!-- impeccable-disable overused-font -- Space Grotesk + JetBrains Mono are mandated by the intake basics-form PLAN (shared scaffolding: "same as app"); every variant must match. --><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#FAF8F5; --card:#FFFFFF; --card2:#F5F2ED;
  --ink:#211C28; --body:#3B3444; --muted:#6E6878; --faint:#9A93A6;
  --line:#E9E4DC; --line2:#D9D3C9;
  --accent:#BD03F7; --accent-ink:#8A02B5; --accent-soft:rgba(189,3,247,.07); --accent-line:rgba(189,3,247,.35);
  --green:#1E7D4F; --green-soft:#E7F3EC; --green-line:#BCDCC9;
  --amber:#8A5A0A; --amber-strong:#B47408; --amber-soft:#FBF3E1; --amber-line:#EAD9AC;
  --red:#B3362A; --red-soft:#FBECEA; --red-line:#EFC7C1;
  --mono:'JetBrains Mono',ui-monospace,monospace;
  --sans:'Space Grotesk',system-ui,sans-serif;
  --r:10px; --r-lg:16px;
  --shadow:0 1px 2px rgba(40,30,60,.05), 0 8px 28px -18px rgba(40,30,60,.25);
  --user-ink:#FFFFFF;
}
.dark{
  --bg:#16121B; --card:#1F1A26; --card2:#282230;
  --ink:#F2EEF7; --body:#D6D0DF; --muted:#A29AAE; --faint:#7A7288;
  --line:#2F2939; --line2:#3D3648;
  --accent:#D65CFF; --accent-ink:#E393FF; --accent-soft:rgba(214,92,255,.1); --accent-line:rgba(214,92,255,.4);
  --green:#5FC58F; --green-soft:#1B2B22; --green-line:#2E4A3A;
  --amber:#E4B45E; --amber-strong:#E4B45E; --amber-soft:#2E2617; --amber-line:#4A3D22;
  --red:#F08C80; --red-soft:#2E1B18; --red-line:#4A2C27;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 28px -18px rgba(0,0,0,.6);
  --user-ink:#1A0A22;
}
*{box-sizing:border-box}
html,body{height:100%;}
body{margin:0; background:var(--bg); color:var(--body); font-family:var(--sans); font-size:16px; line-height:1.6; -webkit-font-smoothing:antialiased; transition:background .25s;}
button{font-family:inherit;}

/* ---------- shell ---------- */
.app{display:flex; flex-direction:column; height:100dvh; min-height:100dvh;}
.appbar{display:flex; align-items:center; gap:14px; padding:14px clamp(16px,4vw,40px); border-bottom:1px solid var(--line); background:var(--bg); flex:none; z-index:5;}
.logo{display:flex; align-items:center; gap:11px; color:var(--ink); font-weight:600; font-size:15.5px; letter-spacing:-.01em;}
.mark{width:18px; height:18px; display:grid; grid-template-columns:repeat(3,1fr); gap:2.5px; flex:none;}
.mark i{background:var(--faint); border-radius:1.5px; aspect-ratio:1;}
.mark i:nth-child(1),.mark i:nth-child(5),.mark i:nth-child(9){background:var(--accent);}
.appbar .sp{flex:1;}
.nav{display:flex; align-items:center; gap:6px;}
.pill{border:1px solid transparent; background:none; color:var(--muted); border-radius:999px; padding:7px 15px; font-size:14px; cursor:pointer; white-space:nowrap; transition:background .15s,color .15s;}
.pill:hover{color:var(--ink);}
.pill.active{background:var(--accent); color:#fff; font-weight:500;}
.dark .pill.active{color:#1A0A22;}
.toggle{border:1px solid var(--line2); background:var(--card); color:var(--body); border-radius:999px; width:38px; height:38px; display:grid; place-items:center; cursor:pointer; font-size:16px; flex:none; transition:background .15s;}
.toggle:hover{background:var(--card2);}
.who{display:flex; align-items:center; gap:9px; padding-left:6px;}
.avatar{width:32px; height:32px; border-radius:50%; background:var(--accent-soft); border:1px solid var(--accent-line); display:grid; place-items:center; font-size:12px; font-weight:600; color:var(--accent-ink); flex:none;}
.who .nm{font-size:13.5px; color:var(--muted);}
@media (max-width:720px){ .who .nm, .pill:not(.active){display:none;} }

/* ---------- stage / conversation ---------- */
.stage{flex:1; min-height:0; display:flex; flex-direction:column; align-items:center; overflow:hidden;}
.convo{flex:1; min-height:0; width:100%; overflow-y:auto; scroll-behavior:smooth;}
.convo-inner{max-width:760px; margin:0 auto; padding:34px clamp(16px,5vw,32px) 26px; display:flex; flex-direction:column; gap:6px;}
.intro{margin:2px 2px 22px;}
.intro .kick{font:500 12px/1 var(--mono); letter-spacing:.14em; text-transform:uppercase; color:var(--accent-ink); background:var(--accent-soft); border:1px solid var(--accent-line); padding:5px 11px; border-radius:999px; display:inline-block;}
.intro h1{color:var(--ink); font-size:23px; font-weight:600; letter-spacing:-.015em; margin:14px 0 4px;}
.intro p{margin:0; color:var(--muted); font-size:15px; max-width:52ch;}

/* message row */
.row{display:flex; gap:11px; align-items:flex-end; padding:5px 0;}
.row.user{justify-content:flex-end;}
.spark{width:30px; height:30px; border-radius:9px; background:linear-gradient(150deg,var(--accent),var(--accent-ink)); display:grid; place-items:center; flex:none; box-shadow:0 4px 14px -6px var(--accent-line);}
.spark svg{width:17px; height:17px; display:block;}
.bubble{max-width:min(80%,520px); padding:12px 16px; border-radius:16px; font-size:15.5px; line-height:1.5; color:var(--ink);}
.row.assistant .bubble{background:var(--card2); border:1px solid var(--line); border-bottom-left-radius:6px;}
.row.user .bubble{background:var(--accent); color:var(--user-ink); border-bottom-right-radius:6px; font-weight:500; box-shadow:0 6px 18px -10px var(--accent-line);}
.row.user .bubble .sub{display:block; font-size:12.5px; font-weight:400; opacity:.82; margin-top:2px;}

/* enter animation */
.anim-in{animation:pop .34s cubic-bezier(.2,.8,.2,1) both;}
@keyframes pop{from{opacity:0; transform:translateY(9px) scale(.98);} to{opacity:1; transform:none;}}

/* typing indicator */
.typing .bubble{display:inline-flex; gap:5px; align-items:center; padding:15px 17px;}
.typing .dot{width:7px; height:7px; border-radius:50%; background:var(--faint); animation:blink 1.2s infinite ease-in-out both;}
.typing .dot:nth-child(2){animation-delay:.18s;}
.typing .dot:nth-child(3){animation-delay:.36s;}
@keyframes blink{0%,80%,100%{opacity:.25; transform:translateY(0);}40%{opacity:1; transform:translateY(-3px);}}

/* quick-reply chips */
.chips{display:flex; flex-wrap:wrap; gap:9px; padding:10px 0 8px 41px; max-width:640px;}
.chips.gone{display:none;}
.chip{display:inline-flex; align-items:center; gap:9px; border:1.5px solid var(--line2); background:var(--card); color:var(--ink); border-radius:13px; padding:9px 15px 9px 13px; font-size:14.5px; font-weight:500; cursor:pointer; text-align:left; transition:border-color .15s,background .15s,transform .12s; animation:pop .3s cubic-bezier(.2,.8,.2,1) both;}
.chip:hover{border-color:var(--accent); background:var(--accent-soft); transform:translateY(-1px);}
.chip:active{transform:translateY(0);}
.chip .ic{color:var(--accent-ink); display:grid; place-items:center;}
.chip .ic svg{width:16px; height:16px; display:block;}
.chip .ex{display:block; font-size:12.5px; font-weight:400; color:var(--muted); margin-top:1px;}
.chip .tx{display:flex; flex-direction:column;}
.chip .lo{display:none;}
@media (prefers-reduced-motion:no-preference){
  .chips .chip:nth-child(2){animation-delay:.05s;}
  .chips .chip:nth-child(3){animation-delay:.1s;}
  .chips .chip:nth-child(4){animation-delay:.15s;}
}

/* ---------- composer ---------- */
.composer-wrap{flex:none; width:100%; border-top:1px solid var(--line); background:var(--bg);}
.composer{max-width:760px; margin:0 auto; padding:14px clamp(16px,5vw,32px) 22px; display:flex; align-items:flex-end; gap:10px;}
.field{flex:1; display:flex; align-items:flex-end; gap:8px; border:1.5px solid var(--line2); background:var(--card); border-radius:14px; padding:6px 6px 6px 16px; transition:border-color .15s,box-shadow .15s;}
.field.focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft);}
.field.locked{opacity:.55;}
#ci{flex:1; border:none; background:none; color:var(--ink); font:inherit; font-size:15.5px; resize:none; max-height:120px; padding:9px 0; line-height:1.4; outline:none;}
#ci::placeholder{color:var(--faint);}
.send{width:40px; height:40px; border-radius:11px; border:none; background:var(--accent); color:var(--user-ink); display:grid; place-items:center; cursor:pointer; flex:none; transition:opacity .15s,transform .12s;}
.send svg{width:18px; height:18px;}
.send:disabled{opacity:.35; cursor:not-allowed;}
.send:not(:disabled):hover{transform:translateY(-1px);}
.chint{max-width:760px; margin:-8px auto 0; padding:0 clamp(16px,5vw,32px); font:400 12px/1.4 var(--mono); color:var(--faint); letter-spacing:.01em;}
.chint b{color:var(--green); font-weight:500;}

/* ---------- state pill ---------- */
.statepill{position:fixed; left:16px; bottom:14px; z-index:40; font:400 10px/1.5 var(--mono); color:var(--muted); background:var(--card); border:1px solid var(--line2); border-radius:8px; padding:5px 9px; cursor:pointer; max-width:min(360px,72vw); box-shadow:var(--shadow); text-align:left;}
.statepill .lbl{display:flex; align-items:center; gap:6px; color:var(--faint); letter-spacing:.08em; text-transform:uppercase;}
.statepill .lbl::before{content:''; width:6px; height:6px; border-radius:50%; background:var(--faint);}
.statepill pre{margin:6px 0 0; white-space:pre-wrap; word-break:break-word; color:var(--body); display:none;}
.statepill.open pre{display:block;}
.statepill.flash{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft);}

@media (prefers-reduced-motion:reduce){
  *{animation-duration:.001ms !important; transition-duration:.001ms !important;}
  .convo{scroll-behavior:auto;}
}
</style>
</head>
<body>
<div class="app">
  <header class="appbar">
    <div class="logo"><span class="mark" aria-hidden="true"><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i><i></i></span>Software Factory</div>
    <span class="sp"></span>
    <nav class="nav">
      <button class="pill active">New request</button>
      <button class="pill">My requests</button>
    </nav>
    <button class="toggle" id="themeBtn" aria-label="Toggle theme">☀</button>
    <div class="who"><span class="avatar">JD</span><span class="nm">Jordan D.</span></div>
  </header>

  <main class="stage">
    <div class="convo" id="convo">
      <div class="convo-inner" id="thread">
        <div class="intro">
          <span class="kick">New request · basics</span>
          <h1>Let's scope this together.</h1>
          <p>Three quick taps and we jump straight into the interview. No form.</p>
        </div>
      </div>
    </div>

    <div class="composer-wrap">
      <div class="composer">
        <div class="field locked" id="field">
          <textarea id="ci" rows="1" placeholder="Tap a reply above to begin…" disabled></textarea>
        </div>
        <button class="send" id="send" disabled aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M12 5l7 7-7 7"/></svg>
        </button>
      </div>
      <div class="chint" id="chint"></div>
    </div>
  </main>
</div>

<button class="statepill" id="statepill" aria-label="Toggle collected state">
  <span class="lbl">state</span>
  <pre id="stateJson"></pre>
</button>

<script>
(function(){
  var reduce = window.matchMedia('(prefers-reduced-motion:reduce)').matches;

  /* ---- theme toggle ---- */
  var root = document.documentElement, tbtn = document.getElementById('themeBtn');
  function syncTheme(){ tbtn.textContent = root.classList.contains('dark') ? '☀' : '☾'; }
  syncTheme();
  tbtn.addEventListener('click', function(){ root.classList.toggle('dark'); syncTheme(); });

  /* ---- refs ---- */
  var convo = document.getElementById('convo');
  var thread = document.getElementById('thread');
  var field = document.getElementById('field');
  var ci = document.getElementById('ci');
  var send = document.getElementById('send');
  var chint = document.getElementById('chint');

  /* ---- state ---- */
  var state = { type:null, audience:null, impact:null };
  var stateEl = document.getElementById('statepill');
  var stateJson = document.getElementById('stateJson');
  function renderState(){ stateJson.textContent = JSON.stringify(state, null, 2); }
  renderState();
  stateEl.addEventListener('click', function(){ stateEl.classList.toggle('open'); });
  function flashState(){
    stateEl.classList.add('open','flash');
    setTimeout(function(){ stateEl.classList.remove('flash'); }, 900);
  }

  /* ---- icons ---- */
  var I = {
    fix:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 1-5.3 5.3L4 17v3h3l5.4-5.4a4 4 0 0 0 5.3-5.3l-2.4 2.4-2.2-.5-.5-2.2 2.1-2.4z"/></svg>',
    improve:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 17l5-5 4 3 6-7"/><path d="M18 8h3v3"/></svg>',
    build:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9L12 3z"/><path d="M12 12l8-4.5M12 12v9M12 12L4 7.5"/></svg>',
    other:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5" cy="12" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="19" cy="12" r="1.4"/></svg>'
  };

  /* ---- the scripted basics flow ---- */
  var questions = [
    {
      key:'type',
      text:"Hey — I'm your intake guide. First up: what kind of request is this?",
      chips:[
        {v:'Fix a problem', ex:'something is broken or painful', icon:I.fix},
        {v:'Improve an app', ex:'make an existing tool better', icon:I.improve},
        {v:'Build a new app', ex:'nothing like it exists yet', icon:I.build},
        {v:'Something else', ex:'not sure it fits a box', icon:I.other}
      ],
      compose:false
    },
    {
      key:'audience',
      text:"Got it. Who's this for — and roughly how many people?",
      chips:[
        {v:'Just me', ex:'1 person'},
        {v:'My team', ex:'2–10 people'},
        {v:'A department', ex:'10–50 people'},
        {v:'Lots of us', ex:'50+ people'}
      ],
      compose:true,
      hint:'You can also just type who exactly — e.g. <b>the 6 people on QA who file these</b>.'
    },
    {
      key:'impact',
      text:"Last quick one. If this works, what actually changes?",
      chips:[
        {v:'Saves time', ex:'hours back every week'},
        {v:'Saves money', ex:'cuts a real cost'},
        {v:'Fewer errors', ex:'less rework, more trust'},
        {v:'Makes it possible', ex:"something we just can't do today"}
      ],
      compose:false
    }
  ];

  var step = 0;

  function scrollDown(){ convo.scrollTop = convo.scrollHeight; }

  function addRow(kind){
    var row = document.createElement('div');
    row.className = 'row ' + kind + (reduce ? '' : ' anim-in');
    if(kind === 'assistant'){
      var sp = document.createElement('div');
      sp.className = 'spark';
      sp.innerHTML = '<svg viewBox="0 0 24 24" fill="#fff"><path d="M12 2l1.9 5.6L19.5 9l-4.4 3.8L16 19l-4-3.2L8 19l.9-6.2L4.5 9l5.6-1.4L12 2z"/></svg>';
      row.appendChild(sp);
    }
    return row;
  }

  function assistantSay(text, cb){
    // typing indicator
    var t = addRow('assistant');
    t.classList.add('typing');
    var b = document.createElement('div');
    b.className = 'bubble';
    b.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
    t.appendChild(b);
    thread.appendChild(t);
    scrollDown();

    var delay = reduce ? 260 : (520 + Math.min(text.length * 12, 780));
    setTimeout(function(){
      thread.removeChild(t);
      var row = addRow('assistant');
      var bub = document.createElement('div');
      bub.className = 'bubble';
      bub.textContent = text;
      row.appendChild(bub);
      thread.appendChild(row);
      scrollDown();
      if(cb) setTimeout(cb, reduce ? 40 : 160);
    }, delay);
  }

  function userSay(main, sub){
    var row = addRow('user');
    var bub = document.createElement('div');
    bub.className = 'bubble';
    bub.textContent = main;
    if(sub){ var s = document.createElement('span'); s.className = 'sub'; s.textContent = sub; bub.appendChild(s); }
    row.appendChild(bub);
    thread.appendChild(row);
    scrollDown();
  }

  function showChips(q){
    var wrap = document.createElement('div');
    wrap.className = 'chips';
    q.chips.forEach(function(c){
      var chip = document.createElement('button');
      chip.className = 'chip';
      chip.innerHTML = (c.icon ? '<span class="ic">'+c.icon+'</span>' : '') +
        '<span class="tx"><span>'+c.v+'</span>'+(c.ex?'<span class="ex">'+c.ex+'</span>':'')+'</span>';
      chip.addEventListener('click', function(){
        wrap.classList.add('gone');
        answer(q, c.v, c.ex);
      });
      wrap.appendChild(chip);
    });
    thread.appendChild(wrap);
    scrollDown();
  }

  function setComposer(mode){
    // mode: 'locked' | 'active' | 'live'
    if(mode === 'locked'){
      ci.disabled = true; send.disabled = true;
      field.classList.add('locked');
      ci.placeholder = 'Tap a reply above…';
      chint.innerHTML = '';
    } else if(mode === 'active'){
      ci.disabled = false; field.classList.remove('locked');
      ci.placeholder = 'Type who it’s for…';
      ci.focus();
    } else if(mode === 'live'){
      ci.disabled = false; field.classList.remove('locked');
      ci.placeholder = 'Type your answer…';
      chint.innerHTML = '';
      ci.focus();
    }
    updateSend();
  }

  function updateSend(){ send.disabled = ci.disabled || ci.value.trim() === ''; }

  function answer(q, value, sub){
    userSay(value, (q.key === 'audience' && sub) ? sub : null);
    state[q.key] = value;
    renderState();
    setComposer('locked');
    step++;
    setTimeout(nextStep, reduce ? 120 : 480);
  }

  var live = false;         // free interview mode after basics
  var liveIdx = 0;
  var liveFollow = [
    "Perfect — that's everything I need to get started. Walk me through how this gets handled today, start to finish.",
    "Helpful. Where does it break down or eat the most time?",
    "Noted. And who signs off before it's considered done?",
    "Great, I've got a clear picture. Anything you'd flag that I haven't asked about yet?"
  ];

  function nextStep(){
    if(step < questions.length){
      var q = questions[step];
      assistantSay(q.text, function(){
        showChips(q);
        setComposer(q.compose ? 'active' : 'locked');
        if(q.compose && q.hint) chint.innerHTML = q.hint;
        window.__activeQ = q;
      });
    } else {
      // closing line -> go live
      assistantSay("Great — let's dig in.", function(){
        setTimeout(function(){
          assistantSay(liveFollow[0], function(){
            live = true; liveIdx = 1;
            setComposer('live');
          });
        }, reduce ? 120 : 420);
      });
    }
  }

  /* ---- composer send handling ---- */
  function submitComposer(){
    var text = ci.value.trim();
    if(!text || ci.disabled) return;
    ci.value = ''; autosize();
    if(live){
      userSay(text, null);
      updateSend();
      var follow = liveFollow[Math.min(liveIdx, liveFollow.length - 1)];
      liveIdx++;
      assistantSay(follow);
      flashState();
      return;
    }
    // answering the audience question via free text
    var q = window.__activeQ;
    if(q && q.compose){
      var chips = thread.querySelector('.chips:not(.gone)');
      if(chips) chips.classList.add('gone');
      userSay(text, null);
      state[q.key] = text;
      renderState();
      setComposer('locked');
      step++;
      updateSend();
      setTimeout(nextStep, reduce ? 120 : 480);
    }
  }

  function autosize(){ ci.style.height = 'auto'; ci.style.height = Math.min(ci.scrollHeight, 120) + 'px'; }

  ci.addEventListener('input', function(){ autosize(); updateSend(); });
  ci.addEventListener('focus', function(){ if(!ci.disabled) field.classList.add('focus'); });
  ci.addEventListener('blur', function(){ field.classList.remove('focus'); });
  ci.addEventListener('keydown', function(e){
    if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); submitComposer(); }
  });
  send.addEventListener('click', submitComposer);

  /* ---- kick off ---- */
  setTimeout(nextStep, reduce ? 200 : 650);
})();
</script>
</body>
</html>
