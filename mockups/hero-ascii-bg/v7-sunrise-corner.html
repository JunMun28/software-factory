<!doctype html>
<!-- THROWAWAY PROTOTYPE — intake hero ASCII background, v7 "Sunrise corner".
     Asymmetric: one big warm aurora sweeps in from the top-left corner
     (coral → peach → magenta → violet) and dissolves before mid-screen.
     Light theme; the rest of the page stays clean. -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PROTOTYPE v7 — Sunrise corner</title>
<style>
  @font-face { font-family: 'Micron Basis'; src: url('fonts/MicronBasis-Regular.otf') format('opentype'); font-weight: 400; font-display: swap; }
  @font-face { font-family: 'Micron Basis'; src: url('fonts/MicronBasis-Medium.otf') format('opentype'); font-weight: 500 600; font-display: swap; }
  @font-face { font-family: 'Micron Basis'; src: url('fonts/MicronBasis-Bold.otf') format('opentype'); font-weight: 700; font-display: swap; }
  @font-face { font-family: 'Micron Basis'; src: url('fonts/MicronBasis-Black.otf') format('opentype'); font-weight: 800 900; font-display: swap; }
  @property --ang { syntax: '<angle>'; inherits: false; initial-value: 0deg; }

  :root {
    --bg: #faf9fb; --fg1: #1a1a1f; --muted: #6c6c78; --faint: #75757f;
    --surface: #ffffff; --surface-2: #f4f3f7; --border: #e6e6ea;
    --a500: #bd03f7; --accent: #a402dc; --accent-hover: #8a01bc;
    --body: 'Micron Basis', system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    font-family: var(--body); color: var(--fg1); background: var(--bg);
    overflow: hidden; -webkit-font-smoothing: antialiased;
  }
  #fx { position: fixed; inset: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; }

  .top {
    position: fixed; top: 18px; left: 0; right: 0; z-index: 10;
    display: flex; align-items: center; justify-content: space-between; padding: 0 28px;
  }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 800; font-size: 17px; letter-spacing: -.01em; }
  .brand svg { display: block; }
  .brand .dot { color: var(--a500); }
  .navpill {
    position: absolute; left: 50%; transform: translateX(-50%);
    display: flex; gap: 4px; padding: 5px; border-radius: 999px;
    background: rgba(255,255,255,.6); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(20,18,28,.07); box-shadow: 0 8px 24px rgba(20,18,28,.08);
  }
  .navpill a { padding: 7px 16px; border-radius: 999px; font-size: 13.5px; font-weight: 600; color: var(--muted); text-decoration: none; }
  .navpill a.on { background: var(--surface-2); color: var(--fg1); box-shadow: inset 0 0 0 1px var(--border); }
  .avatar {
    width: 34px; height: 34px; border-radius: 999px; display: grid; place-items: center;
    background: var(--surface-2); border: 1px solid var(--border);
    font-size: 12.5px; font-weight: 700; color: var(--fg1);
  }

  .hero {
    position: relative; z-index: 1; min-height: 100dvh;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    text-align: center; padding: 8px 24px 26px;
  }
  h1 { font-size: clamp(32px, 4.8vw, 50px); font-weight: 800; letter-spacing: -.02em; line-height: 1.04; margin: 14px 0 6px; }
  .sub { margin: 0 0 28px; font-size: 15px; color: var(--muted); max-width: 44ch; }

  .glow {
    width: 100%; max-width: 640px; border-radius: 20px; padding: 2px;
    background: conic-gradient(from var(--ang, 0deg), #bd03f7, #4b16e0, #22d3ee, #e173fa, #bd03f7);
    animation: spin 6s linear infinite;
    box-shadow: 0 0 40px -12px rgba(189,3,247,.5);
  }
  @keyframes spin { to { --ang: 360deg; } }
  .card { background: var(--surface); border-radius: 18px; padding: 16px 16px 10px; text-align: left; }
  .card textarea {
    width: 100%; border: none; background: none; resize: none; outline: none;
    padding: 6px; min-height: 104px; font-family: inherit; font-size: 16px; line-height: 1.55; color: var(--fg1);
  }
  .card textarea::placeholder { color: var(--faint); }
  .row { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding-top: 8px; }
  .add {
    width: 34px; height: 34px; border-radius: 10px; border: none; background: none; color: var(--muted);
    display: grid; place-items: center; cursor: pointer; font-size: 19px; line-height: 1;
  }
  .add:hover { background: var(--surface-2); color: var(--fg1); }
  .send {
    width: 38px; height: 38px; border-radius: 12px; border: none; background: var(--accent); color: #fff;
    display: grid; place-items: center; cursor: pointer;
  }
  .send:hover { background: var(--accent-hover); }
  .hint { margin-top: 24px; font-size: 12.5px; color: var(--faint); font-family: var(--mono); }
  @media (max-width: 640px) { .navpill { display: none; } }
  @media (prefers-reduced-motion: reduce) { .glow { animation: none; } }
</style>
</head>
<body>

<canvas id="fx" aria-hidden="true"></canvas>

<header class="top">
  <div class="brand">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <rect x="6" y="3" width="15" height="5" rx="2.5"/>
      <rect x="4.5" y="9.5" width="15" height="5" rx="2.5"/>
      <rect x="3" y="16" width="15" height="5" rx="2.5"/>
    </svg>
    Stream<span class="dot">.</span>
  </div>
  <nav class="navpill">
    <a class="on" href="#">New request</a>
    <a href="#">My requests</a>
  </nav>
  <div class="avatar">JW</div>
</header>

<main class="hero">
  <h1>What should we build?</h1>
  <p class="sub">Put your idea into words. We’ll help turn it into a clear plan.</p>
  <div class="glow">
    <div class="card">
      <textarea placeholder="Describe it in your own words…"></textarea>
      <div class="row">
        <button class="add" type="button" aria-label="Attach files">+</button>
        <button class="send" type="button" aria-label="Continue">
          <svg viewBox="0 0 24 24" width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
        </button>
      </div>
    </div>
  </div>
  <span class="hint">Press ⌘↵ to continue</span>
</main>

<script>
(function () {
  var canvas = document.getElementById('fx');
  var ctx = canvas.getContext('2d');
  var CELL_W = 21, CELL_H = 17;
  var GLOW_ALPHA = 0.3;
  var TIERS = [
    [0.78, ['S','S','S','F']],
    [0.58, ['S','S','#','F']],
    [0.40, ['#','8','0','S']],
    [0.24, ['X','8','0','+']],
    [0.10, ['+','=','·','x']]
  ];

  function hash(x, y) {
    var h = (x * 374761393 + y * 668265263) | 0;
    h = ((h ^ (h >>> 13)) * 1274126177) | 0;
    return ((h ^ (h >>> 16)) >>> 0) / 4294967296;
  }

  // One aurora anchored beyond the top-left corner, sweeping diagonally in:
  // coral core → peach → magenta → violet, gone before mid-screen.
  function paintScene(o, w, h) {
    var cx = -w * 0.28, cy = -h * 0.5;
    var g = o.createRadialGradient(cx, cy, 0, cx, cy, h * 1.35);
    g.addColorStop(0.00, 'rgba(255,106,74,0)');
    g.addColorStop(0.28, 'rgba(255,106,74,.9)');
    g.addColorStop(0.42, 'rgba(255,190,150,.88)');
    g.addColorStop(0.54, 'rgba(226,115,250,.82)');
    g.addColorStop(0.68, 'rgba(122,42,230,.5)');
    g.addColorStop(0.85, 'rgba(122,42,230,0)');
    o.fillStyle = g;
    o.fillRect(0, 0, w, h);
    // keep the composer column clean: fade the field out toward the right
    // and below the fold of the sweep
    var m = o.createLinearGradient(0, h * 0.22, 0, h * 0.46);
    m.addColorStop(0, 'rgba(0,0,0,0)');
    m.addColorStop(1, 'rgba(0,0,0,1)');
    o.globalCompositeOperation = 'destination-out';
    o.fillStyle = m;
    o.fillRect(0, 0, w, h);
    o.globalCompositeOperation = 'source-over';
  }

  function render() {
    var W = window.innerWidth, H = window.innerHeight;
    var dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    ctx.clearRect(0, 0, W, H);

    var cols = Math.ceil(W / CELL_W), rows = Math.ceil(H / CELL_H);
    var off = document.createElement('canvas');
    off.width = cols; off.height = rows;
    var o = off.getContext('2d');
    paintScene(o, cols, rows);
    var px = o.getImageData(0, 0, cols, rows).data;

    ctx.save();
    ctx.filter = 'blur(48px)';
    ctx.globalAlpha = GLOW_ALPHA;
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(off, 0, 0, cols, rows, 0, 0, W, H);
    ctx.restore();

    ctx.font = '600 12px "JetBrains Mono", ui-monospace, Menlo, monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var i = (r * cols + c) * 4;
        var a = px[i + 3] / 255;
        if (a < 0.10) continue;
        var h1 = hash(c, r), h2 = hash(c * 7 + 13, r * 3 + 5);
        if (h1 < 0.07) continue;
        if (h2 < (0.8 - a) * 0.5) continue;
        var chars = null;
        for (var t = 0; t < TIERS.length; t++) {
          if (a >= TIERS[t][0]) { chars = TIERS[t][1]; break; }
        }
        if (!chars) continue;
        var ch = chars[Math.floor(hash(c * 31 + 7, r * 17 + 3) * chars.length)];
        ctx.fillStyle = 'rgba(' + px[i] + ',' + px[i + 1] + ',' + px[i + 2] + ',' + (0.42 + 0.58 * a).toFixed(3) + ')';
        ctx.fillText(ch, c * CELL_W + CELL_W / 2, r * CELL_H + CELL_H / 2);
      }
    }
  }

  var raf = null;
  window.addEventListener('resize', function () {
    cancelAnimationFrame(raf);
    raf = requestAnimationFrame(render);
  });
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(render);
  render();
})();
</script>

</body>
</html>
