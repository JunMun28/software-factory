<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>ng-v0</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    // Set the theme before the app boots to avoid a flash of the wrong one.
    (function () {
      var stored = localStorage.getItem('ng-v0-theme');
      var dark = stored ? stored === 'dark'
        : window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (dark) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
