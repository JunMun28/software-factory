# ng-v0 UI (app-preview) — static SPA served by nginx, mirrors apps/console/nginx.conf.
# Reproduces dev's proxy.conf.json: /api/* is proxied to the orchestrator with the
# ^/api prefix STRIPPED (dev used pathRewrite "^/api": ""), so the SPA's /api/chats
# reaches the orchestrator's real route /chats.

# WebSocket upgrade plumbing for the preview HMR tunnel proxied through the
# orchestrator. `map` lives in the http context; conf.d/*.conf is included there.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;

    # same-origin API → orchestrator Service DNS. The trailing slash on proxy_pass
    # makes nginx replace the matched "/api/" location prefix with "/", i.e. it
    # STRIPS /api (the orchestrator's routes carry no /api prefix). Upgrade/Connection
    # headers let the HMR WebSocket (tunnelled by the preview bridge) pass through.
    location /api/ {
        proxy_pass http://ng-v0-orchestrator:7071/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        # live editing streams must not be cut mid-flight
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # SPA fallback — Angular owns client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/css application/javascript application/json font/woff2;
}
